---
name: Linting

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DEFAULT_NODE: 24

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7.0.0
      - name: 🏗 Set up Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
      - name: 🏗 Install dependencies
        run: npm ci
      - name: 🚀 Run ESLint
        run: npm run lint

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7.0.0
      - name: 🏗 Set up Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
      - name: 🏗 Install dependencies
        run: npm ci
      - name: 🚀 Run Prettier
        run: npm run format:check

  i18n:
    name: I18n
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7.0.0
      - name: 🏗 Set up Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
      - name: 🏗 Install dependencies
        run: npm ci
      - name: 🚀 Check translation catalogs
        run: npm run i18n:check
      - name: 🚀 Scan hardcoded UI copy
        run: npm run i18n:scan-hardcoded

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7.0.0
      - name: 🏗 Set up Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
      - name: 🏗 Install dependencies
        run: npm ci
      - name: 🚀 Run Next.js build
        run: npm run build
